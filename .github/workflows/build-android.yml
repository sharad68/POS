name: Build Android APK

# Run only when a version tag (e.g. v1.0.0) is pushed, plus manual runs
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app (Vite -> dist)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set app version
        run: |
          # On a tag push (e.g. v1.2.0) use the tag without the leading "v" as the version name.
          # On a manual run (no tag) fall back to 1.0.<run number>.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="1.0.${{ github.run_number }}"
          fi
          # versionCode must be an increasing integer; the run number guarantees that.
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "Applied versionCode=${{ github.run_number }}, versionName=${VERSION_NAME}"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ env.VERSION_NAME }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
