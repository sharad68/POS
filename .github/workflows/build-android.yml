name: Build Android APK

# Run on every push to main, and allow manual runs from the Actions tab
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app (Vite -> dist)
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set app version from run number
        run: |
          VERSION_NAME="1.0.${{ github.run_number }}"
          # versionCode must be an increasing integer; versionName is the human-readable label
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "Applied versionCode=${{ github.run_number }}, versionName=${VERSION_NAME}"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
